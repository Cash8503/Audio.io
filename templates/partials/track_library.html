<section class="track-library-shell">
    <div class="dividing-header">
        <span>{{ track_library_heading }}</span>
    </div>

    <section class="controls track-library-controls" aria-label="Track library controls">
        <input
            id="track-search-input"
            type="search"
            placeholder="{{ track_library_search_placeholder or 'Search tracks...' }}"
            aria-label="Search tracks"
        />

        <select id="track-sort-select" class="setting-input" aria-label="Sort tracks">
            <option value="custom">Custom</option>
            <option value="title-asc">Title A-Z</option>
            <option value="title-desc">Title Z-A</option>
            <option value="uploader-asc">Uploader A-Z</option>
            <option value="uploader-desc">Uploader Z-A</option>
            <option value="duration-asc">Length Shortest</option>
            <option value="duration-desc">Length Longest</option>
            <option value="quality-desc">Quality Highest</option>
            <option value="quality-asc">Quality Lowest</option>
            <option value="imported-desc">Imported Newest</option>
            <option value="imported-asc">Imported Oldest</option>
        </select>

        {% if track_library_show_playlist_filter %}
        <select
            id="playlist-select"
            class="setting-input"
            aria-label="Playlist"
        >
            <option value="">All Tracks</option>
        </select>
        {% endif %}
    </section>

    <p id="track-results-summary" class="track-results-summary"></p>

    <section class="library" id="track-list"></section>
</section>
