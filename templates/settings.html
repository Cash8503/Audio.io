{% extends "base.html" %} {% block title %}Audio.io - Settings{% endblock %} {%
block content %}
<section class="settings">
    <div class="dividing-header">
        <span>Settings</span>
    </div>

    <p class="settings-subtitle">
        Choose how Audio.io looks and tune download behavior.
    </p>

    <div id="settings-groups"></div>

    <section id="settings-tools-section" class="settings-group" hidden>
        <h3>Tools</h3>
        <div id="settings-tools"></div>
    </section>

    <p
        id="settings-save-result"
        class="settings-action-result"
        role="status"
    ></p>
</section>
{% endblock %} {% block scripts %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
